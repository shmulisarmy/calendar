<head>

    <script src="https://unpkg.com/htmx.org@1.7.0/dist/htmx.min.js"></script>


    <style>
        body {
            margin: 0%;
            background: linear-gradient(45deg, darkblue, black, darkblue);
            s
        }

        @keyframes slide {

            100% {
                transform: translateX(200%);
            }
        }

        nav {
            background: linear-gradient(90deg, #f79533, #f37055, #ef4e7b, #a166ab, #5073b8, #1098ad, #07b39b, #6fba82);
            position: sticky;
            top: 0%;
            left: 0%;
            z-index: 1;

        }

        table {
            animation: slide;
            animation-timeline: scroll();
            border-collapse: collapse;
            width: 300px;

        }

        tr {
            background-color: rgba(255, 255, 255, 0.436);
        }

        th,
        td {
            border: 1px solid transparent;
            padding: 10px;
            text-align: center;

        }

        th {
            background-color: #4caf4f80;
            color: white;
        }

        td {
            border: 1px solid transparent;
            transition: .2s;
        }

        td:active {
            transform: scale(.7);
        }

        td:hover {
            background-color: rgb(255, 166, 0);
            border: 1px solid black;
            cursor: pointer;
        }

        tr:nth-child(even) {
            background-color: #f2f2f290;
        }

        table tr:hover {
            background-color: rgba(0, 0, 0, 0.475);
        }

        header {
            text-shadow: 2px 2px 2px;
            text-align: center;
        }

        main {
            border-radius: 10px;
            background-color: rgba(0, 255, 255, 0.491);

            margin: 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            grid-gap: 20px;
        }

        .event {
            border-radius: 10px;
            padding: 8%;
            margin: 8%;
            background-color: white;
            border: 4px solid transparent;
            position: relative;

        }

        .event:hover {
            border: 4px solid darkmagenta;
            background-color: rgba(0, 0, 0, 0.71);
            color: white;
            cursor: pointer;

        }

        header {
            color: #07b39b;
        }

        form.create-event {
            padding: 20px;
            width: 300px;
            height: 100px;
            border-radius: 10px;
            background: linear-gradient(90deg, pink, yellow);
            color: black;
        }


        .x {
            position: absolute;
            top: 0px;
            left: 0px;
            font-size: 10px;
            font-weight: bold;
            background-color: red;
            border-radius: 30%;
            text-decoration: none;
            padding: 10px;
            color: white;
        }

        .x:hover {
            cursor: pointer;
        }

        .x:active {
            transform: scale(.7);

        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

        }

        .edit {
            animation: appear 2s;
        }
    </style>
    </style>

</head>
